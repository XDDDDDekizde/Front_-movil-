version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chatuser
      DB_PASSWORD: chatpass
      DB_NAME: chatdb
      JWT_SECRET: supersecretkey2026cambialoencproduccion
    depends_on:
      - postgres
    restart: on-failure

volumes:
  postgres_data: